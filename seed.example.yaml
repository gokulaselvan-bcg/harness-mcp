# seed.example.yaml — Harness MCP Seed (Multi-Stack, Filled)
#
# ─── This file is a SCHEMA REFERENCE, not this project's seed ──────────
# It documents every entry type and body shape with a filled multi-stack
# example. This project's actual seed lives in `seed.yaml` (sibling to
# this file) and is tracked in git — it's project-specific, not
# user-specific.
#
# How to produce seed.yaml:
#   1. Open harness-questionnaire.md and fill in every section.
#   2. Hand the completed questionnaire to an AI assistant with the prompt:
#         "Generate seed.yaml from this questionnaire, following the
#          structure of seed.example.yaml."
#   3. The assistant writes the file as `seed.yaml` at the repo root.
#   4. Load it: `python seed.py --input seed.yaml --db data/harness.db`
#   5. Commit `seed.yaml` — it's the project's canonical seed.
#
# Why the name must be exactly `seed.yaml`:
#   - It's the project's single source of truth for DB seeding — one
#     canonical name, one canonical file.
#   - The README, harness-questionnaire.md, and seed-script examples
#     all assume `seed.yaml` for the real file.
#   - Keeps `seed.example.yaml` (schema reference) and `seed.yaml`
#     (this project's content) cleanly separated.
#
# Loaded via: python seed.py --input seed.yaml --db data/harness.db
#
# Philosophy: Readability-first, anti-overengineering, multi-stack.
# Code should look like a competent human wrote it after thinking
# carefully — not like an AI tried to impress a reviewer.
#
# Stack assumptions (versions live in repo files, not here):
#   - Java 21, Spring Boot 3, Spring AI, JPA, Flyway, JUnit 5
#   - Python 3.11+, FastAPI, Pydantic v2, SQLAlchemy 2, Alembic, pytest
#   - TypeScript 5+, React 19, Vite, Module Federation, Vitest, Zod
#   - Postgres + pgvector, Kafka, EntraID, AWS (S3, CloudWatch, X-Ray)
#
# Tags used consistently:
#   Language: python, java, typescript
#   Concern: microservices, multi-tenancy, event-driven, ai-orchestration,
#            observability, security, anti-overengineering
#   Category: testing, api, database, logging, dependencies, config

entries:

  # ═══════════════════════════════════════════════════════════════════
  # UNIVERSAL PRINCIPLES (apply across all languages)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Pin exact versions; lockfile is the source of truth"
    tags: [dependencies, version-pinning, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Every direct dependency is pinned to an exact version.
        - Python: pyproject.toml + uv.lock
        - Java: pom.xml with explicit versions + dependencyManagement
        - TypeScript: package.json + package-lock.json (or pnpm-lock.yaml)

        Lockfiles committed and authoritative. CI uses the lockfile.
        Local dev uses the lockfile. "Works on my machine" is solved
        by everyone using the same versions.
      reasoning: |
        Reproducibility beats freshness across all three stacks.
        Pinned versions of three months old are fine; latest versions
        that break silently are not.
      alternatives_considered: |
        - Version ranges: rejected. Even patch versions can break.
        - No lockfile: rejected. Across multiple stacks, drift is
          catastrophic.

  - type: decision
    title: "New dependency requires an ADR and tech-lead approval"
    tags: [dependencies, governance, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Before adding a library: open a short ADR (docs/adr/) covering
        the problem, alternatives considered, license, maintenance
        health (recent releases, contributors, issues), and whether
        the standard library or an already-approved library solves it.
        Tech lead approves before merge.

        This applies equally to Python, Java, and TypeScript additions.
      reasoning: |
        Every dependency is a long-term liability — security patches,
        version bumps, license review, supply-chain risk. The barrier
        to adding one should exceed writing twenty lines yourself.
      alternatives_considered: |
        - Free-for-all per language: rejected.
        - Pre-approved list only: too rigid.

  - type: decision
    title: "Names describe meaning, not mechanics; length is not a constraint"
    tags: [code-standards, naming, readability, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Names describe what the thing means, not how it's computed.
        - A 30-character self-explaining name beats a 5-character name
          that needs a comment.
        - Booleans start with `is_`, `has_`, `should_`, `can_`, `was_`
          (snake_case for Python) or `is`, `has`, `should`, `can`,
          `was` (camelCase for Java/TS).
        - Functions/methods returning a value use noun phrases.
          Functions performing an action use verb phrases.
        - Constants are UPPER_SNAKE_CASE (Python, Java) or
          UPPER_SNAKE_CASE (TS).
        - Classes are PascalCase across all three languages.
        - Modules/packages are lowercase across all three languages
          (Python snake_case, Java lowercase joined, TS kebab-case
          for files, camelCase for symbols).
      reasoning: |
        Code is read far more often than written. Marginal cost of a
        longer name: one second of typing. Marginal benefit: every
        future read.

      alternatives_considered: |
        - Short names plus explanatory comments (rejected: comments rot; names don't).
        - Hungarian / type-prefix notation (rejected: redundant with explicit types in modern languages).
  - type: decision
    title: "Size limits: files <400 lines, functions <50, nesting ≤3"
    tags: [code-organization, file-size, readability, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Across all three languages:
        - Files under 400 lines. Hard ceiling 600.
        - Functions/methods under 50 lines. Hard ceiling 100.
        - Maximum 3 levels of nested control flow.
        - Use early returns to flatten.

        Numbers are not magic. The goal: a tired developer on a
        Friday afternoon can read top-to-bottom and understand.
      reasoning: |
        These limits push decomposition before complexity compounds.
        Early returns are not a smell.
      alternatives_considered: |
        - No limits, judgment-based: rejected. Explicit numbers end
          subjective arguments faster.

  # ═══════════════════════════════════════════════════════════════════
  # ANTI-OVERENGINEERING (universal + language-specific bans)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Prefer functions over classes (universal)"
    tags: [anti-overengineering, simplicity, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Universal rule: use a class only when AT LEAST ONE is true:
        - Multiple methods share genuine instance state
        - A well-defined interface needs multiple real implementations
          (today, not theoretically)
        - You are extending a framework class (FastAPI, Spring, React
          component classes — rare in modern React)
        - The language idiomatically prefers classes (Java for
          services, repositories, controllers — yes)

        Otherwise: module-level functions in Python and TypeScript;
        static utility methods OR Spring beans in Java (Spring uses
        classes for DI, that's idiomatic).

        Single-method classes with no state are functions in disguise.
        In Python and TypeScript, convert them. In Java, if it's a
        @Component or @Service, that's fine; if it's a plain utility
        class with one method, use a static method.
      reasoning: |
        AI assistants reach for classes by default because OOP is
        overrepresented in training data. Push back consistently.
        Different languages have different idioms — respect them.
      alternatives_considered: |
        - "Always use classes": rejected, creates single-method
          classes.
        - "Never use classes": rejected, fights language idioms.

  - type: decision
    title: "Composition over inheritance (universal)"
    tags: [anti-overengineering, simplicity, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Universal rule: inheritance only when ALL true:
        - Real "is-a" relationship
        - Defined interface contract
        - Two or more concrete implementations exist today

        Inheritance to "share code" between unrelated classes: banned.
        Extract module-level functions or composition.

        Class hierarchies more than 2 levels deep require an exception
        entry and PR explanation.

        Python: mixins banned by default. Multiple inheritance
        requires tech-lead approval.
        Java: extending abstract classes is fine when the hierarchy
        models a real relationship. Don't introduce abstract classes
        for code sharing.
        TypeScript: class inheritance is rare; functional composition
        is the default. React class components are banned.
      reasoning: |
        Inheritance creates implicit dependencies. Composition is
        explicit and testable. The AI failure mode is generating
        BaseFooService → AbstractFooHandler → ConcreteFooImpl
        across all three languages.

      alternatives_considered: |
        - "Use inheritance for code sharing" (rejected: implicit dependencies that block refactoring and testing).
        - Mixins as default (rejected: produced unreadable MRO chains in past projects).
  - type: decision
    title: "Don't abstract until duplicated three times"
    tags: [anti-overengineering, simplicity, universal, dry]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Rule of three, universal:
        - First occurrence: write it inline.
        - Second occurrence: copy it.
        - Third occurrence: now extract a function/method/component.

        Banned premature abstractions across all three languages:
        - Generic factories with 2 concrete cases
        - Plugin systems with no plugins
        - "Configurable" code paths with one configuration
        - Type aliases hiding object literals
        - Protocols/interfaces with one implementation
      reasoning: |
        Duplication is visible; bad abstraction is invisible.
        Refactoring duplication takes an afternoon. Untangling
        premature abstraction takes weeks.

      alternatives_considered: |
        - Abstract at first duplication (rejected: we are usually wrong about the right shape with one sample).
        - Never abstract (rejected: real duplication produces drift and inconsistency).
  - type: decision
    title: "DRY applies to facts; rule of three applies to code structure"
    tags: [code-organization, principles, dry, anti-overengineering, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        DRY (single canonical representation) applies to:
        - Configuration values (one Settings/properties source)
        - Secrets (one secrets store, one reference per consumer)
        - MCP entries (one rule per entry)
        - Database schema (one migration, one source of truth)
        - API contracts (one schema per shape)
        - Business constants

        DRY does NOT apply to code structure until duplication has
        occurred three times.

        Test: is the duplicated thing a fact or a structure? Fact:
        DRY immediately. Structure: wait for three.
      reasoning: |
        Duplicated facts diverge silently and produce wrong behavior.
        Duplicated code structure is visible and fixable. Premature
        abstraction is invisible and damaging.

      alternatives_considered: |
        - Apply DRY uniformly to facts AND structure (rejected: causes premature structural abstraction).
        - Drop DRY entirely (rejected: duplicated facts drift silently and produce wrong behavior).
  - type: decision
    title: "Anti-overengineering ban list: Python"
    tags: [anti-overengineering, python]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Banned in Python without an exception entry:
        - Metaclasses
        - __init_subclass__ tricks
        - Custom descriptors
        - Monkey-patching third-party code
        - Dynamic class creation at runtime
        - Decorator factories beyond functools.wraps
        - Single-method classes
        - Inheritance solely to share helper methods
        - Async without await (use sync)
        - Custom exceptions for one-off errors (use ValueError, etc.)
        - List comprehensions with conditional + nested expression +
          function call on one line — split into a loop
        - typing.Generic when concrete types work
        - typing.Protocol with one implementation
      reasoning: |
        These patterns appear far more in AI-generated Python than
        in human Python that survives in production.

      alternatives_considered: |
        - Style guide as documentation only (rejected: not enforced, drifts immediately).
        - Whitelist of allowed patterns instead of ban list (rejected: too rigid, blocks legitimate cases).
  - type: decision
    title: "Anti-overengineering ban list: Java"
    tags: [anti-overengineering, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Banned in Java without an exception entry:
        - Field injection (@Autowired on fields). Use constructor
          injection only.
        - Lombok @Data, @SuperBuilder, @ToString chains. Use records
          for value objects, plain classes otherwise.
        - Interface-with-one-implementation "for testability"
        - Abstract classes that exist only to share helper methods
        - Static utility classes with mutable state
        - Reflection beyond what Spring already provides
        - @Async without measured need (event loop overhead, debugging
          pain)
        - Optional as a method parameter (return Optional fine, accept
          deliberately or split methods)
        - Object-typed parameters where a specific type works
        - Thread.sleep in production code
        - Stream chains longer than 4 operations (use a regular loop
          for readability)
        - Premature use of CompletableFuture / reactive streams
        - Custom annotations with reflective processing for non-
          framework needs
      reasoning: |
        Java's ecosystem has decades of patterns; AI tends to apply
        them indiscriminately. The ban list focuses on the patterns
        that AI overuses while skipping the patterns that have real
        application (transactions, DI via constructor, validation).

      alternatives_considered: |
        - Rely on IDE warnings only (rejected: not consistently enforced across the team).
        - Allow patterns case-by-case in review (rejected: argument tax on every PR).
  - type: decision
    title: "Anti-overengineering ban list: TypeScript"
    tags: [anti-overengineering, typescript]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Banned in TypeScript without an exception entry:
        - `any` type. Use `unknown` and narrow.
        - `enum`. Use `as const` objects or union types.
        - React class components
        - useEffect for derived state (compute during render instead)
        - useMemo / useCallback without a measured performance reason
        - Custom hooks that wrap one library call with no added logic
        - Context providers for two consumers (pass props)
        - Generic components with one concrete usage
        - Service-class wrappers around fetch (write functions)
        - Type aliases that hide what's really an object literal
        - Default exports for components (use named exports)
        - React.FC with explicit children typing (let TS infer)
        - try/catch wrapping a single await with no handling beyond
          rethrow
      reasoning: |
        TypeScript's ecosystem has had time to develop strong opinions
        about what works. AI output often lags behind current
        community consensus.

      alternatives_considered: |
        - Trust ESLint defaults (rejected: don't cover React-specific anti-patterns we care about).
        - Project ESLint rules without a central rationale (rejected: rules without a documented "why" get suppressed inline).
  # ═══════════════════════════════════════════════════════════════════
  # READABILITY & DESIGN PRINCIPLES
  # ═══════════════════════════════════════════════════════════════════

  - type: context
    title: "Principle of Least Astonishment: predictability is a feature"
    tags: [code-standards, readability, principles, pola, universal]
    author: "tech-lead"
    status: accepted
    body:
      area: "Design principles"
      content: |
        When two approaches both work, pick the one the next reader
        expects given the rest of the codebase.

        Consistency is anti-surprise. Surprise is a tax on every
        future reader.

        Justifies many boring choices in this seed:
        - One framework per language (FastAPI, Spring Boot, React)
        - Feature-folder layout the same shape in every service
        - Standard status codes, no inventing
        - Conventional commits, squash merge, linear history
        - Same validation pattern everywhere within a language

        In practice:
        - If the codebase uses pattern X in five places, the sixth
          place uses pattern X — even if Y is slightly more elegant.
        - Don't break a naming convention for one special case.
        - Don't introduce handlers.py / views.py when the standard
          folder is router.py / service.py.

        When inconsistency is unavoidable (third-party integration
        forces a shape), comment the deviation and explain why.

  # ═══════════════════════════════════════════════════════════════════
  # CODE STRUCTURE (universal + language layout)
  # ═══════════════════════════════════════════════════════════════════

  - type: pattern
    title: "Feature-folder layout: Python (FastAPI)"
    tags: [code-organization, structure, python]
    author: "tech-lead"
    status: accepted
    evidence_links:
      - "https://github.com/zhanymkanov/fastapi-best-practices"
    body:
      use_case: |
        Organizing a FastAPI service so related code stays together.
      structure: |
        src/
          app/
            main.py              # FastAPI app init, router mounting
            settings.py          # Settings class, all env vars
            auth/                # one feature per folder
              router.py          # HTTP layer (thin)
              schemas.py         # Pydantic request/response models
              service.py         # business logic
              exceptions.py      # feature-specific exceptions
            payments/
              router.py
              schemas.py
              service.py
              exceptions.py
            common/              # genuinely shared (2+ consumers)
              db.py
              logging.py
              http_client.py
              tenant.py          # tenant context, RLS helpers
          tests/
            auth/
            payments/
            common/
          alembic/
            versions/

        A feature folder owns its router, schemas, service, and
        exceptions. Shared code moves to common/ only when 2+ features
        consume it.
      when_to_apply: |
        Every Python service. Default for new services.
      when_not_to_apply: |
        Single-file scripts in /scripts/.

  - type: pattern
    title: "Feature-folder layout: Java (Spring Boot)"
    tags: [code-organization, structure, java]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Organizing a Spring Boot service so related code stays
        together.
      structure: |
        src/main/java/com/example/<service>/
          Application.java                    # main class
          config/                             # @Configuration beans
            SecurityConfig.java
            KafkaConfig.java
          auth/                               # one feature per package
            AuthController.java               # @RestController, thin
            AuthService.java                  # @Service, business logic
            AuthRepository.java               # @Repository / JpaRepository
            dto/
              LoginRequest.java               # record
              LoginResponse.java              # record
            exception/
              AuthException.java
              InvalidCredentialsException.java
          payments/
            PaymentController.java
            PaymentService.java
            ...
          common/
            tenant/                           # tenant context, RLS
            logging/
            error/                            # global @ControllerAdvice

        src/main/resources/
          application.yml
          db/migration/                       # Flyway

        src/test/java/com/example/<service>/
          auth/
          payments/

        Controllers stay thin (validate, delegate, return). Services
        hold business logic. Repositories handle persistence.
      when_to_apply: |
        Every Java/Spring Boot service.
      when_not_to_apply: |
        N/A.

  - type: pattern
    title: "Feature-folder layout: TypeScript (React + Vite)"
    tags: [code-organization, structure, typescript]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Organizing a React frontend so related code stays together.
      structure: |
        src/
          main.tsx                 # entry point
          App.tsx                  # root component
          routes/                  # route components, one per route
            login/
              Login.tsx
              Login.test.tsx
              loginApi.ts          # fetch functions for this route
              loginSchemas.ts      # Zod schemas
            payments/
              Payments.tsx
              Payments.test.tsx
              paymentsApi.ts
              paymentsSchemas.ts
          components/              # reusable UI (used by 2+ routes)
            Button.tsx
            Modal.tsx
            TenantBadge.tsx
          hooks/                   # reusable hooks (2+ consumers)
            useAuth.ts
            useTenant.ts
          lib/                     # genuinely shared utilities
            fetcher.ts             # fetch wrapper
            queryClient.ts         # TanStack Query config
            errorBoundary.tsx
          types/                   # shared types
            api.ts                 # API contract types

        Each route owns its API calls, schemas, and tests. Component
        and hook directories only contain things used by 2+ routes.
      when_to_apply: |
        Every React app.
      when_not_to_apply: |
        Tiny prototype apps.

  # ═══════════════════════════════════════════════════════════════════
  # TYPE SAFETY (language-specific implementations of one principle)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Type safety at boundaries: Python (Pydantic v2)"
    tags: [type-safety, boundaries, python]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Every function or method that:
        - Accepts data from outside the service (HTTP body, query
          params, Kafka payload, file content)
        - Returns data to outside the service
        - Crosses a feature-folder boundary

        must use Pydantic v2 models. Raw dicts are fine inside a
        single function for ephemeral local use.

        Type hints required on every function signature. mypy strict
        in CI. `Any` requires a comment explaining why on the line
        above. `# type: ignore` requires a comment with error code
        and reason.
      reasoning: |
        Pydantic catches schema drift early. Free validation,
        serialization, OpenAPI generation. Cost is a few lines per
        model; benefit is every future read.

      alternatives_considered: |
        - Dataclasses with manual validation (rejected: validation drifts from the shape).
        - TypedDict (rejected: static-only, no runtime guarantees).
        - msgspec / attrs (rejected: weaker FastAPI/OpenAPI integration than Pydantic).
  - type: decision
    title: "Type safety at boundaries: Java (Bean Validation + records)"
    tags: [type-safety, boundaries, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - DTOs are Java records (not POJOs with getters/setters).
        - Bean Validation annotations (@NotNull, @Size, @Email,
          @Positive, etc.) on every record field that comes from
          outside.
        - @Valid on controller method parameters.
        - Custom validators for business rules (one validator class
          per rule).
        - Never accept raw Map<String, Object> on controllers.
        - Records are immutable; no setter generation.
        - Strong typing throughout — no `Object` parameters unless
          interfacing with a framework that requires it.
      reasoning: |
        Records + Bean Validation give us Pydantic-equivalent
        guarantees. Validation is declarative, immutability is free,
        controllers stay thin.

      alternatives_considered: |
        - POJOs with Lombok @Data (rejected: mutable, getter/setter sprawl).
        - Manual validation in controllers (rejected: duplicated, easy to miss a field).
  - type: decision
    title: "Type safety at boundaries: TypeScript (Zod + tsconfig strict)"
    tags: [type-safety, boundaries, typescript]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - tsconfig.json has strict: true, noUncheckedIndexedAccess:
          true, exactOptionalPropertyTypes: true.
        - All API responses validated through Zod schemas at the
          fetch boundary. Never trust the network.
        - Form inputs validated through Zod before submission.
        - Type definitions inferred from Zod schemas
          (`z.infer<typeof Schema>`), not declared separately.
        - `any` is banned (see TS ban list).
        - `unknown` is the type for untrusted data; narrow with type
          guards.
      reasoning: |
        TypeScript types are erased at runtime. Zod gives runtime
        validation that doubles as the type source. No drift between
        types and validation logic.

      alternatives_considered: |
        - Trust TypeScript types alone (rejected: types are erased at runtime; network responses are untyped without runtime checks).
        - io-ts (rejected: less ergonomic than Zod, smaller ecosystem).
        - Yup (rejected: weaker TypeScript integration than Zod).
  - type: decision
    title: "Datetimes: UTC everywhere, timezone-aware always"
    tags: [data-handling, datetime, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Universal:
        - Storage in DB: UTC. Postgres column type: timestamptz.
        - Transport: ISO 8601 with timezone, always UTC.
        - Display: convert to user timezone only in presentation layer.

        Per-language:
        - Python: `datetime.now(UTC)` from datetime module. Never
          `datetime.utcnow()` (returns naive). Never naive datetimes
          anywhere.
        - Java: java.time.Instant for storage and transport.
          ZonedDateTime only for display formatting.
        - TypeScript: ISO strings for transport. Date objects only
          in presentation layer. Consider date-fns-tz over moment.

        No mixed timezone arithmetic. No string parsing without
        explicit timezone.
      reasoning: |
        Naive datetimes are a recurring bug class. One rule, no
        exceptions, across all three stacks.

      alternatives_considered: |
        - Store local times with a timezone label (rejected: arithmetic across DST is a recurring bug class).
        - Store as Unix epoch only (rejected: loses human-readability in DB inspection and logs).
  # ═══════════════════════════════════════════════════════════════════
  # CONFIGURATION & SECRETS
  # ═══════════════════════════════════════════════════════════════════

  - type: pattern
    title: "Centralized typed config: Python (Pydantic Settings)"
    tags: [config, access, python]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Centralized typed configuration. No scattered os.getenv.
      structure: |
        # src/app/settings.py
        from pydantic_settings import BaseSettings, SettingsConfigDict

        class Settings(BaseSettings):
            model_config = SettingsConfigDict(
                env_file=".env", extra="forbid",
            )

            database_url: str
            database_pool_size: int = 10

            kafka_bootstrap_servers: str
            entraid_tenant_id: str

            openai_api_key: str          # via secrets manager in prod
            langfuse_host: str | None = None

        settings = Settings()  # module-level singleton

        # Everywhere else:
        from app.settings import settings
        # use: settings.database_url

        Rules:
        - No os.getenv() in app code. Settings only.
        - extra="forbid" catches typos in env var names.
        - Nested via sub-models when fields exceed ~25.
      when_to_apply: |
        Every Python service.
      when_not_to_apply: |
        Trivial scripts in /scripts/.

  - type: pattern
    title: "Centralized typed config: Java (@ConfigurationProperties)"
    tags: [config, access, java]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Typed configuration in Spring Boot, no scattered @Value.
      structure: |
        // src/main/java/com/example/config/AppProperties.java
        @ConfigurationProperties(prefix = "app")
        @Validated
        public record AppProperties(
            @NotNull String databaseUrl,
            @Positive int databasePoolSize,
            @NotNull String kafkaBootstrapServers,
            @NotNull String entraidTenantId,
            @NotNull String openaiApiKey,
            String langfuseHost
        ) {}

        // src/main/resources/application.yml
        app:
          database-url: ${DATABASE_URL}
          database-pool-size: 10
          kafka-bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
          ...

        // Usage:
        @Service
        public class PaymentService {
            private final AppProperties props;
            public PaymentService(AppProperties props) {
                this.props = props;
            }
            // use props.databaseUrl()
        }

        Rules:
        - No @Value scattered in beans. @ConfigurationProperties only.
        - Records with @Validated for compile-time + runtime safety.
        - application.yml uses env-var placeholders for secrets.
      when_to_apply: |
        Every Spring Boot service.
      when_not_to_apply: |
        N/A.

  - type: pattern
    title: "Centralized typed config: TypeScript (env.ts + Zod)"
    tags: [config, access, typescript]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Validated env access in a Vite/React app.
      structure: |
        // src/lib/env.ts
        import { z } from "zod";

        const envSchema = z.object({
          VITE_API_BASE_URL: z.string().url(),
          VITE_ENTRAID_CLIENT_ID: z.string(),
          VITE_LANGFUSE_PUBLIC_KEY: z.string().optional(),
        });

        export const env = envSchema.parse(import.meta.env);

        // Usage:
        import { env } from "@/lib/env";
        fetch(`${env.VITE_API_BASE_URL}/orders`);

        Rules:
        - All env vars validated at module load (fail fast).
        - VITE_ prefix required for client-visible vars.
        - Secrets never live in client env (browser bundle is public).
        - No process.env reads outside this file.
      when_to_apply: |
        Every React app.
      when_not_to_apply: |
        N/A.

  - type: decision
    title: "Secrets never live in the repo or in code"
    tags: [secrets, security, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Secrets live in the team's secrets manager (AWS Secrets
          Manager configured per env).
        - Local development uses .env files (gitignored). Never
          committed. .env.example committed with placeholder values.
        - CI fetches secrets at job start.
        - Pre-commit hook scans for accidentally-committed secrets
          (gitleaks).
        - Client-side TypeScript: no secrets ever (bundle is public).
          Only public keys, URLs, and identifiers.
      reasoning: |
        Secrets in repo means rotation is a PR cycle, history holds
        them forever, and any contributor breach exposes production.

      alternatives_considered: |
        - Encrypted secrets file committed to repo (rejected: rotation is still a PR cycle; key management is its own burden).
        - Per-developer secret copies (rejected: drift, no central revocation).
  # ═══════════════════════════════════════════════════════════════════
  # MICROSERVICE ARCHITECTURE (cross-cutting concern)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Microservice boundaries: own database, own deployment, own team-time"
    tags: [microservices, architecture, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        A microservice is a separate service when ALL true:
        - It owns its own database schema (Postgres schema-per-service)
        - It has its own deployment pipeline and can deploy
          independently
        - It can be worked on by a small group without coordinating
          with another team
        - Its team-time cost (cognitive overhead, on-call burden) is
          justified by the boundary

        Otherwise, it is a module inside a larger service, not a
        microservice.

        Banned anti-patterns:
        - Sharing a database between services
        - Services calling each other synchronously in long chains
          (>2 hops)
        - "Microservices" that always deploy together
      reasoning: |
        Microservices are an organizational technology more than a
        technical one. The cost of distribution (network, partial
        failure, debugging, deployment coordination) only pays back
        when there's a real boundary.

      alternatives_considered: |
        - Microservice per noun (rejected: distributed monolith with shared DB; worst of both worlds).
        - Single deploy unit forever (rejected: blocks independent scaling and on-call ownership where real boundaries exist).
  - type: decision
    title: "Inter-service communication: async via Kafka first, REST only when needed"
    tags: [microservices, event-driven, architecture, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Default communication: async via Kafka events.

        Use synchronous REST/gRPC only when:
        - The caller needs the response to complete its request
        - Total latency must be minimized
        - There is no natural workflow involved

        Even for sync calls, prefer fire-and-forget event publication
        as a follow-up. Don't chain 3 services synchronously.

        Banned: services that synchronously call back into their
        caller's chain ("cyclic dependencies via HTTP").
      reasoning: |
        Async communication via Kafka gives natural retries, replay,
        and decoupling. Sync chains create cascading failure modes
        and tight coupling.

      alternatives_considered: |
        - Synchronous REST/gRPC as default (rejected: cascading failures and tight coupling).
        - Service mesh with sync gRPC (rejected: still synchronous; adds protocol surface without solving chain-failure).
  - type: pattern
    title: "Kafka event schemas: versioned, schema-registry-backed"
    tags: [microservices, event-driven, kafka, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Defining and evolving event payloads without breaking
        consumers.
      structure: |
        - All events serialized as JSON with a schema in the schema
          registry.
        - Topic naming: <domain>.<entity>.<event-type>.v<N>
          Example: payments.order.created.v1
        - Each event includes:
            - event_id (UUID)
            - event_type (string matching topic)
            - tenant_id (always, for multi-tenancy)
            - occurred_at (UTC timestamp)
            - schema_version (matches topic suffix)
            - data (typed payload)
        - Breaking changes: new topic version, both run in parallel
          until consumers migrated.
        - Additive changes (new optional field): same version.

        Consumer side:
        - Idempotency: every event has event_id; consumers track
          processed IDs and skip duplicates.
        - DLQ: failed events after retry go to <topic>.dlq.
        - Schema validation on consume; reject malformed events.

        Per-language consumer patterns:
        - Python: aiokafka + Pydantic models for event payloads
        - Java: Spring Kafka + records for event payloads
        - TypeScript: KafkaJS only if browser-facing (rare); typically
          consumed via a backend gateway service
      when_to_apply: |
        Every Kafka event.
      when_not_to_apply: |
        Internal-to-service events (use in-process).

  - type: decision
    title: "API contracts: OpenAPI for REST, schema registry for events"
    tags: [microservices, api, contracts, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - REST APIs: OpenAPI 3.1 specs generated from code (FastAPI
          generates natively; Spring Boot via springdoc-openapi).
        - The generated spec is committed to the repo on every
          release tag for diffing across versions.
        - Kafka events: JSON schemas in the schema registry, one per
          topic version.
        - Versioning: URL path for REST (`/v1/orders`); topic suffix
          for events.
        - Breaking change requires new version + parallel run period.
        - Old version supported at least 6 months after new is GA.
      reasoning: |
        Generated specs don't drift from code. Handwritten always do.
        Schema-registry-backed events give producers and consumers
        independent evolution.

      alternatives_considered: |
        - Handwritten OpenAPI specs maintained separately from code (rejected: drifts immediately).
        - No event schema (rejected: every consumer reinvents parsing and breaks differently).
  - type: pattern
    title: "Idempotency for cross-service operations"
    tags: [microservices, api, resilience, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Making cross-service operations safe under retries and
        duplicate delivery.
      structure: |
        For HTTP POST endpoints that create or modify state:
        - Accept an Idempotency-Key header (UUID from caller).
        - Store key + result for 24h (Redis or Postgres).
        - On retry with same key: return stored result, don't re-execute.

        For Kafka consumers:
        - Track event_id of processed events (Postgres table per
          service).
        - On duplicate event_id: skip.

        For database writes that may retry:
        - Use INSERT ... ON CONFLICT DO NOTHING / DO UPDATE.
        - Or natural deduplication via unique constraint.

        Per-language libraries:
        - Python: standard Postgres uniqueness + a Redis client
        - Java: Spring's @Idempotent annotation pattern OR explicit
          handler
        - TypeScript: rarely produces side effects directly; relies
          on backend idempotency
      when_to_apply: |
        Every non-read API endpoint that crosses a service boundary.
        Every Kafka consumer.
      when_not_to_apply: |
        Read-only endpoints. In-process pure functions.

  - type: pattern
    title: "Timeouts, retries, circuit breakers for cross-service calls"
    tags: [microservices, resilience, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Preventing cascading failures across services.
      structure: |
        Every outbound HTTP call MUST have:
        - Connect timeout: 2 seconds default
        - Read timeout: 10 seconds default
        - Retry: max 3 attempts, exponential backoff (1s, 2s, 4s)
        - Retry only on transient failures (network errors, 502, 503,
          504). NEVER on 4xx.
        - Idempotency-Key on retried POSTs.

        Circuit breaker on each downstream dependency:
        - Open after 5 consecutive failures
        - Half-open after 30s, single trial call
        - Close on success

        Per-language libraries:
        - Python: httpx + tenacity for retries; circuitbreaker package
        - Java: Resilience4j (timeouts, retries, circuit breaker)
        - TypeScript: fetch with AbortController + manual retry logic;
          tanstack-query handles retry on the frontend

        No unbounded waits. No default-no-timeout. Pre-commit hooks
        flag missing timeouts where detectable.
      when_to_apply: |
        Every outbound HTTP call.
      when_not_to_apply: |
        In-process calls.

  # ═══════════════════════════════════════════════════════════════════
  # MULTI-TENANCY
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Multi-tenancy: tenant_id on every row + Postgres RLS"
    tags: [multi-tenancy, security, database, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Every business table has a `tenant_id` column (UUID, NOT
          NULL).
        - Every business table has a Postgres Row-Level Security
          policy enforcing tenant_id matches the session's tenant
          context.
        - Application code sets the tenant context per request via
          a Postgres session variable (`SET app.tenant_id = ...`)
          before any query.
        - Cross-tenant queries (admin, reporting) use a separate
          service account with bypass-RLS privilege; audit every use.
        - tenant_id flows through Kafka events too (every event
          carries tenant_id).
      reasoning: |
        RLS at the database is the only place tenant isolation
        cannot be bypassed by application bugs. Two-layer defense
        (application + database) catches what either layer misses
        alone.

      alternatives_considered: |
        - Database-per-tenant or schema-per-tenant (rejected: doesn't scale operationally to thousands of tenants).
        - Application-level filtering only (rejected: a single missing WHERE clause leaks data across tenants).
  - type: pattern
    title: "Tenant context propagation across the request lifecycle"
    tags: [multi-tenancy, security, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Ensuring tenant_id flows from authentication through every
        database query and outbound call.
      structure: |
        Request lifecycle:
        1. Auth middleware extracts tenant_id from JWT (set by
           EntraID claim).
        2. Tenant ID stored in request-scoped context:
           - Python: contextvars
           - Java: ThreadLocal via Spring's RequestContextHolder
           - TypeScript: route-level state; tenant ID passed to fetch
        3. DB session begins with `SET LOCAL app.tenant_id = '...'`.
        4. Every outbound HTTP call propagates X-Tenant-ID header.
        5. Every Kafka event publish includes tenant_id in payload.

        Banned:
        - Passing tenant_id as a function parameter (errors omit it)
        - Reading tenant_id directly from JWT in business logic
          (couples to auth shape)
        - Cross-tenant queries from application code (use admin
          service)
      when_to_apply: |
        Every business operation. Every endpoint. Every event.
      when_not_to_apply: |
        System-level operations (migrations, health checks).

  # ═══════════════════════════════════════════════════════════════════
  # TESTING (universal principles + per-language)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Tests fail before implementation; 100% coverage on business logic"
    tags: [testing, workflow, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Universal across all three languages:
        - Write failing test first. Commit it failing. Then write
          implementation. Visible in `git log`, checked in review.
        - Business logic (service layer): 100% line coverage, CI-
          enforced.
        - Glue code (router/controller, framework wiring): not
          coverage-gated but at least one happy-path integration test.
        - Scripts: not coverage-gated (exception entry).
      reasoning: |
        Tests-first prevents the "implementation drives test" failure
        mode.

      alternatives_considered: |
        - Tests after implementation (rejected: implementation drives the test; edge cases get missed).
        - 100% coverage everywhere (rejected: not worth the cost on trivial glue code).
  - type: decision
    title: "Testing standards: Python (pytest)"
    tags: [testing, python]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - pytest, functions not classes (rare exceptions for shared
          class-scoped fixtures).
        - Test files mirror source: src/app/auth/service.py →
          tests/auth/test_service.py.
        - Test names: test_<subject>_<scenario>_<expected>.
        - AAA structure with blank lines between phases.
        - Parametrize for multiple inputs of same test.
        - Factories for complex objects (tests/factories.py).
        - Mock at boundary (httpx, DB in unit tests, time, randomness).
        - Never mock internal modules from same feature.
        - pytest-asyncio for async tests.
        - Coverage via pytest-cov.
      reasoning: |
        Standard pytest is the readable baseline.

      alternatives_considered: |
        - unittest stdlib (rejected: more boilerplate, weaker fixture system).
        - Test classes by default (rejected: harder to share fixtures across files; functions are the pytest idiom).
  - type: decision
    title: "Testing standards: Java (JUnit 5 + Mockito + Spring Boot Test)"
    tags: [testing, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - JUnit 5 (Jupiter). No JUnit 4.
        - Test method names use snake_case via @DisplayName or just
          camelCase with descriptive names:
          shouldRejectExpiredPasswordOnLogin().
        - One behavior per test. AAA via @Nested or just spacing.
        - Mockito for mocks (boundaries only — HTTP clients, repos
          in unit tests).
        - @SpringBootTest for full integration tests (sparingly —
          slow).
        - @WebMvcTest for controller slice tests.
        - @DataJpaTest for repository slice tests.
        - Testcontainers for tests needing real Postgres/Kafka.
        - AssertJ over Hamcrest for fluent assertions.
        - Never mock @Service classes from same package — extract
          collaborator if needed.
      reasoning: |
        Spring Boot's test slices give fast, focused tests. Mockito
        + AssertJ is the modern consensus.

      alternatives_considered: |
        - JUnit 4 (rejected: superseded; missing nested and parameterized improvements).
        - Spock (rejected: introduces Groovy to a pure-Java codebase).
        - PowerMock (rejected: enables the anti-pattern of mocking static and final).
  - type: decision
    title: "Testing standards: TypeScript (Vitest + React Testing Library)"
    tags: [testing, typescript]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Vitest as the test runner (Vite-native, fast).
        - React Testing Library for component tests (test from user
          perspective).
        - Test files colocated with source: Login.tsx + Login.test.tsx.
        - Test names: `it("rejects expired password on login", ...)`.
        - AAA structure with blank lines.
        - Mock fetch at the network level (msw — Mock Service Worker).
          NEVER mock internal modules.
        - test-id attributes only when no other selector works
          (prefer role, label, text).
        - Async assertions via `waitFor` and `findBy*`.
        - Each test creates its own QueryClient (no shared state).
        - Playwright for E2E (separate test suite, run on staging).
      reasoning: |
        msw mocks at the network layer, so the same tests work as
        unit, integration, and E2E. Avoids the mock-the-internals
        anti-pattern.

      alternatives_considered: |
        - Jest (rejected: slower than Vitest on Vite projects; needs separate config).
        - Enzyme (rejected: tests implementation details; not maintained for React 18+).
        - Cypress component tests (rejected: heavier and slower than RTL for unit-level work).
  # ═══════════════════════════════════════════════════════════════════
  # ASYNC & CONCURRENCY
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Async discipline: Python"
    tags: [async, concurrency, python]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - HTTP endpoints with I/O (DB, external HTTP): async
        - CPU-bound work: sync
        - Anything without await: sync
        - Test code: sync unless testing async behavior

        Never `async` without `await` in the body.

        For blocking calls from async context: `asyncio.to_thread()`.
        Never call blocking code directly in async functions.

        Banned: async-everywhere by default.
      reasoning: |
        Async has real costs (debugging, viral spread). Only earns
        its place when there's I/O concurrency to gain.

      alternatives_considered: |
        - Async everywhere by default (rejected: async-coloring spreads into CPU-bound paths with no benefit).
        - Sync-only (rejected: leaves real I/O concurrency on the table for networked workloads).
  - type: decision
    title: "Async discipline: Java"
    tags: [async, concurrency, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Default to synchronous Spring MVC. It's fine for most loads.
        - Use @Async only when there's a measured need for
          parallelism within a single request.
        - Use CompletableFuture only when composing multiple async
          operations.
        - Reactive (WebFlux, Project Reactor): only with tech-lead
          approval, only for services with measured backpressure
          needs. Most services should not use reactive.
        - Virtual threads (Java 21): fine for I/O-bound work that
          would benefit from parallelism. Don't sprinkle everywhere.

        Banned: mixing reactive and imperative in same service.
      reasoning: |
        Spring MVC's thread-per-request model is simpler to reason
        about and debug. Java 21 virtual threads remove most of the
        historical reasons to go reactive.

      alternatives_considered: |
        - Reactive (WebFlux) by default (rejected: steep debugging curve and mismatch with most service workloads).
        - All work on @Async (rejected: thread-pool overhead and harder-to-trace failures with no measured benefit).
  - type: decision
    title: "Async discipline: TypeScript"
    tags: [async, concurrency, typescript]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - All I/O is async in JS by nature; this isn't optional.
        - Always use async/await, not raw Promise chains, unless
          composing parallel calls.
        - Promise.all for parallel independent calls.
        - Promise.allSettled when partial failure is acceptable.
        - Never use callbacks unless required by a library.
        - useEffect with async: declare a separate async function
          inside and call it (useEffect callback itself cannot be
          async).
        - No fire-and-forget — every promise is awaited or
          explicitly .catch()'d.
      reasoning: |
        JavaScript's event loop and async story are mature. Modern
        patterns (async/await) make code readable; legacy patterns
        (callbacks, raw Promises) don't.

      alternatives_considered: |
        - Raw Promise chains (rejected: harder to read than async/await).
        - Callbacks (rejected: legacy pattern, error-prone, the ecosystem has moved on).
  # ═══════════════════════════════════════════════════════════════════
  # ERROR HANDLING (universal pattern, per-language implementation)
  # ═══════════════════════════════════════════════════════════════════

  - type: pattern
    title: "Error handling: let it raise, catch at boundaries"
    tags: [error-handling, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Where to catch exceptions vs let them propagate, across all
        three languages.
      structure: |
        Universal pattern:
        - Business logic raises specific exceptions. Does not catch
          and swallow.
        - The HTTP boundary translates exceptions to HTTP responses.
        - Background workers translate at the worker boundary.
        - Never catch the universal base exception broadly except at
          the outermost boundary, and only to log + re-raise.

        Python:
        - Business logic: raise specific exceptions.
        - Router layer: try/except, raise HTTPException(404, ...).
        - Or: global exception handler via FastAPI @app.exception_handler.

        Java:
        - Business logic: throw specific RuntimeException subclasses.
        - Controller layer: @ControllerAdvice with @ExceptionHandler
          methods.
        - Each handler maps an exception type to ResponseEntity.

        TypeScript:
        - Throw Error or custom classes.
        - Error boundaries at route level (React).
        - Fetch wrapper translates non-2xx responses to typed errors.
        - Mutations report errors via TanStack Query's onError.
      when_to_apply: |
        All service code.
      when_not_to_apply: |
        N/A.

  - type: decision
    title: "Custom exceptions only after 3 catch sites"
    tags: [error-handling, anti-overengineering, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Use built-in exceptions until 3+ places need to catch a
        specific error type. Then extract a custom exception.

        Acceptable built-ins:
        - Python: ValueError, TypeError, KeyError, RuntimeError,
          PermissionError
        - Java: IllegalArgumentException, IllegalStateException,
          NoSuchElementException, AccessDeniedException
        - TypeScript: Error, TypeError, RangeError

        Custom exception hierarchy (when warranted):
        - One base per feature/package (PaymentException).
        - Specific exceptions inherit from feature base.
        - Max 2 levels (AppException → PaymentException →
          InsufficientFunds).
      reasoning: |
        AI assistants generate exception hierarchies for every
        possible error before there's a single place that
        distinguishes them. Wasted ceremony.

      alternatives_considered: |
        - Custom exception per error condition up front (rejected: ceremony without consumers).
        - Always use built-ins (rejected: at some scale, distinguishing error types becomes necessary).
  # ═══════════════════════════════════════════════════════════════════
  # LOGGING & OBSERVABILITY
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Structured JSON logs to stdout; CloudWatch + X-Ray + Langfuse"
    tags: [logging, observability, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - All logs: structured JSON to stdout. Runtime collects.
        - Python: structlog or std logging with JSON formatter.
          Logger name = module name.
        - Java: Logback with JSON encoder (logstash-encoder).
          Logger via SLF4J: LoggerFactory.getLogger(class).
        - TypeScript: pino on Node-side; console with structured
          context on browser-side (Sentry captures).

        Correlation:
        - Every request has a correlation ID (X-Request-ID header).
        - Generate at gateway if missing; propagate through every
          call.
        - Include in every log line for that request.
        - Include in every Kafka event published.

        AWS X-Ray for distributed tracing across services.
        AWS CloudWatch for log aggregation and dashboards.
        Langfuse for LLM-specific tracing (prompts, completions,
        cost, latency).

        Banned:
        - print() / System.out.println / console.log in app code
          (pre-commit blocks).
        - String concatenation in log calls (use placeholders).
        - Logging in tight loops without sampling.
      reasoning: |
        Structured logs are queryable. One observability stack across
        all services means one mental model.

      alternatives_considered: |
        - Plain-text logs (rejected: not queryable at scale).
        - Per-service log aggregator (rejected: fragmented tooling, inconsistent fields, harder oncall).
  - type: decision
    title: "PII redaction via Presidio; never log raw user data"
    tags: [logging, security, pii, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - PII fields catalogued in a per-service config
          (e.g., src/app/security/pii_fields.py for Python,
          PiiConfig.java for Java).
        - Microsoft Presidio runs as a redaction filter in the logger
          (or via a middleware for HTTP request/response bodies).
        - Standard PII categories redacted:
          email, phone, SSN, credit card, account_number, full name,
          address, IBAN, plus any field tagged @PII / annotated PII.
        - LLM prompts and completions also pass through Presidio
          before being logged or sent to Langfuse.
        - Developer cannot bypass by pre-formatting strings.
        - PII leak in logs is treated as an incident.
      reasoning: |
        Financial-services context. Regulatory requirements.
        Centralized redaction is the only enforcement that scales.

      alternatives_considered: |
        - Per-developer redaction in code (rejected: easy to forget; no audit trail).
        - Log-store-side redaction (rejected: PII still transits the network and sits in buffers).
  # ═══════════════════════════════════════════════════════════════════
  # AI ORCHESTRATION (LangChain/LangGraph + Spring AI)
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "AI orchestration: LangGraph for Python agents, Spring AI for Java"
    tags: [ai-orchestration, python, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Python services use LangGraph for multi-step agent workflows.
          LangChain for simple chains where LangGraph's state machine
          is overkill.
        - Java services use Spring AI for LLM access and Spring AI
          Advisors for cross-cutting concerns (logging, redaction).
        - TypeScript: LLM calls from frontend forbidden (no client-
          side API keys). All LLM access through a backend service.

        Universal principles for AI nodes/steps:
        - Each node/step is a function, not a class wrapper.
        - State minimal — only fields actually read by downstream
          nodes.
        - Prompts in separate files as constants (no class hierarchy).
        - Every LLM call has timeout + retries (resilience standards
          apply).
        - Every LLM call traced through Langfuse.
      reasoning: |
        Match the language ecosystem. Python AI tooling is more
        mature; Java's catching up via Spring AI.

      alternatives_considered: |
        - Plain SDK calls without an orchestration layer (rejected: no shared abstractions for retries, tracing, structured output).
        - A single framework across both languages (rejected: cross-ecosystem ports lag the language-native option).
  - type: pattern
    title: "Structured LLM output: instructor + Pydantic (Python), Spring AI structured output (Java)"
    tags: [ai-orchestration, type-safety, python, java]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Making LLM responses typed and reliable.
      structure: |
        Python:
        # Use instructor for guaranteed Pydantic responses
        from instructor import patch
        import openai

        client = patch(openai.AsyncOpenAI())

        class ClassificationResult(BaseModel):
            classification: Literal["IN_SCOPE", "OUT_OF_SCOPE"]
            reasoning: str

        result = await client.chat.completions.create(
            model="...",
            response_model=ClassificationResult,
            messages=[{"role": "user", "content": prompt}],
        )
        # result is a guaranteed-shaped ClassificationResult

        Java:
        // Spring AI's structured output
        ChatResponse response = chatClient.prompt()
            .user(promptText)
            .call()
            .entity(ClassificationResult.class);

        record ClassificationResult(
            String classification,
            String reasoning
        ) {}

        Both approaches use type-safe structured output instead of
        parsing free-form strings.
      when_to_apply: |
        Every LLM call where you parse the response programmatically.
      when_not_to_apply: |
        Streaming chat responses to a user (free-form is the point).

  - type: pattern
    title: "Langfuse tracing on every LLM call"
    tags: [ai-orchestration, observability, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Tracking prompts, completions, cost, and latency for every
        LLM call across all services.
      structure: |
        Every LLM call is wrapped in a Langfuse trace.
        - Python: langfuse-python's @observe decorator OR
          LangfuseCallbackHandler for LangChain/LangGraph.
        - Java: Spring AI's Advisor pattern with a LangfuseAdvisor
          that captures input/output.

        Each trace includes:
        - tenant_id (for cost attribution per tenant)
        - user_id (for per-user analytics)
        - prompt template ID + version (from Langfuse prompt mgmt)
        - input variables
        - output (post-Presidio redaction)
        - model name + version
        - latency
        - token usage

        Banned:
        - LLM calls outside the traced wrapper
        - Logging raw prompts/completions to CloudWatch (use Langfuse)
        - Hardcoded prompts in code (fetch from Langfuse by ID)
      when_to_apply: |
        Every LLM call in every service.
      when_not_to_apply: |
        Local development with explicit opt-out env var.

  # ═══════════════════════════════════════════════════════════════════
  # DATABASE & MIGRATIONS
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Migrations: Alembic (Python), Flyway (Java); forward-only; destructive ops in two steps"
    tags: [database, migrations, python, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Python services: Alembic in alembic/versions/.
        - Java services: Flyway in src/main/resources/db/migration/.
        - Schema-per-service (each service owns its Postgres schema).
        - Forward-only. No down migrations.
        - Destructive ops (drop column/table/index) in two deploys:
            1. Stop reading/writing. Ship. Observe 24h.
            2. Drop in the next deploy.
        - Migrations that lock tables >100ms in expected prod
          conditions: off-hours deploy, extra approver.
        - Every migration top-of-file comment: what + why.
        - Every new business table: tenant_id column + RLS policy.
      reasoning: |
        Schema rollback is mostly fiction in prod. Forward-only forces
        honest thinking before merge.

      alternatives_considered: |
        - Bidirectional migrations (rejected: down migrations are mostly fiction in production with real data).
        - One-step destructive operations (rejected: app-side and DB-side changing simultaneously is the most common outage cause).
  - type: decision
    title: "Migration PRs require a second approver"
    tags: [database, code-review, python, java]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        Any PR touching alembic/versions/ or db/migration/ requires
        two approvers, one of whom must be tech lead or designated
        database reviewer.

        Rationale in PR template.
      reasoning: |
        Migrations have higher blast radius than app code. Two eyes
        is cheap insurance.

      alternatives_considered: |
        - Same approver count as code (rejected: migrations have higher blast radius than typical code changes).
        - Auto-approve "trivial" migrations (rejected: "trivial" misjudgments are how outages happen).
  - type: decision
    title: "pgvector for vector search; one schema, one extension"
    tags: [database, vector-search, ai-orchestration, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - All vector data lives in pgvector (Postgres extension).
        - One vector schema per service that needs RAG.
        - Index type: HNSW for typical chatbot/search workloads.
        - Distance metric: cosine (most common for OpenAI embeddings).
        - Embedding column: vector(N) where N = model's dimension.
        - Don't introduce a separate vector store (Pinecone, Qdrant,
          Chroma) without an ADR. We have Postgres operational
          experience; adding a new system has high ongoing cost.
      reasoning: |
        pgvector at our scale (financial services, modest corpora)
        avoids operational fragmentation. Stay with what we run.

      alternatives_considered: |
        - Pinecone / Qdrant / Chroma (rejected: new operational surface without measured benefit at our corpus size).
        - In-memory FAISS (rejected: no persistence story, harder to operate).
  # ═══════════════════════════════════════════════════════════════════
  # SECURITY
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Authentication via EntraID through IAuthProvider adapter"
    tags: [security, auth, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - All user auth via Microsoft EntraID (Azure AD).
        - Each service accesses auth via an IAuthProvider adapter
          interface (one of the rare cases where an interface earns
          its place — multiple providers across stacks).
        - Per language:
          - Python: IAuthProvider implementation using MSAL Python.
          - Java: IAuthProvider implementation using MSAL4J + Spring
            Security.
          - TypeScript: MSAL for React on the frontend; backend
            verifies JWTs.
        - JWT tokens validated on every request via the adapter.
        - Service-to-service: managed identities where possible;
          otherwise short-lived JWTs via EntraID app registrations.
        - Token claims include: user_id, tenant_id, roles.
        - tenant_id from JWT is the source of truth (see multi-
          tenancy entries).
      reasoning: |
        Single auth source eliminates a class of identity drift bugs.
        Adapter interface lets us swap providers without rewriting
        services (real future-proofing, not speculative).

      alternatives_considered: |
        - Direct EntraID SDK calls scattered through services (rejected: tight coupling to one identity provider).
        - Build an in-house identity layer (rejected: undifferentiated heavy lifting; no business advantage).
  - type: decision
    title: "Dependency scanning on every PR; high/critical blocks merge"
    tags: [security, dependencies, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Python: pip-audit in CI.
        - Java: OWASP Dependency-Check OR Snyk in CI.
        - TypeScript: npm audit + Snyk in CI.

        High or critical CVEs block merge. Medium files an issue but
        doesn't block. Low noted in monthly update PR.

        Patch SLA:
        - Critical: 48h
        - High: 1 week
        - Medium: 30 days
        - Low: next monthly update
      reasoning: |
        Known-vulnerable dependencies in prod is the most avoidable
        security issue. Scan + SLA make action cheap.

      alternatives_considered: |
        - Periodic scheduled scan only (rejected: vulnerabilities ship to production between scans).
        - Manual review of dependencies on add (rejected: doesn't catch newly-disclosed CVEs on existing dependencies).
  # ═══════════════════════════════════════════════════════════════════
  # GIT & CI/CD
  # ═══════════════════════════════════════════════════════════════════

  - type: decision
    title: "Trunk-based development; short-lived branches; squash merge"
    tags: [git, workflow, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - One main branch. No develop, no staging branches.
        - Feature branches off main, merged within 2-3 days.
        - Long-lived branches: feature flag instead.
        - Squash merge for features. Rebase merge for trivial fixes.
        - No merge commits. Linear history on main.
        - Conventional Commits format on all commits.
      reasoning: |
        Long-lived branches are the most common cause of merge hell.
        Trunk-based forces small changes, which is what you want
        anyway.

      alternatives_considered: |
        - Gitflow with develop / staging branches (rejected: long-lived branches are the merge-hell engine).
        - Merge commits everywhere (rejected: non-linear history makes bisect and revert harder).
  - type: decision
    title: "Code review: one approver; cite MCP IDs; no self-approval"
    tags: [git, code-review, universal]
    author: "tech-lead"
    status: accepted
    body:
      rule: |
        - Every PR: one approving review from non-author.
        - Review comments cite MCP entry IDs where applicable.
        - Migration PRs: two approvers.
        - Review SLA: 24 hours.
        - No drive-by approvals. Reviewer engages or re-assigns.
        - PR description must contain: what (one sentence), why (one
          paragraph), how tested, linked ticket/ADR, MCP entries
          consulted.
      reasoning: |
        Specific reviews with citations end arguments. Drive-by
        approvals just shift bug costs to production.

      alternatives_considered: |
        - Two approvers on every PR (rejected: review SLA blows out; we'd rather move fast and audit).
        - Self-merge after CI green (rejected: a known cause of "looked fine to me" bugs).
  - type: pattern
    title: "CI pipeline shape: lint → type → test → security → build → deploy"
    tags: [ci-cd, pipeline, universal]
    author: "tech-lead"
    status: accepted
    body:
      use_case: |
        Standard CI shape across all three stacks.
      structure: |
        Per language, same stage names:
        1. lint    — Python: ruff. Java: checkstyle + spotless.
                     TS: eslint + prettier.
        2. type    — Python: mypy strict. Java: -Xlint. TS: tsc --noEmit.
        3. test    — Python: pytest with coverage. Java: mvn test.
                     TS: vitest run.
        4. security — dependency scan + SAST (Snyk Code or bandit/
                     spotbugs).
        5. build   — Python: docker build. Java: mvn package +
                     docker build. TS: vite build.
        6. deploy  — only on main, only after all above pass.

        Fail-fast. Cheap stages first.
      when_to_apply: |
        Every service. Customized only with tech-lead approval.
      when_not_to_apply: |
        N/A.

  # ═══════════════════════════════════════════════════════════════════
  # DEVELOPER PERSONA (universal)
  # ═══════════════════════════════════════════════════════════════════

  - type: agent
    title: "developer role"
    tags: [role, developer]
    author: "tech-lead"
    status: accepted
    body:
      role: "developer"
      prompt: |
        You are acting as a developer on this multi-stack
        microservices project.

        Before any non-trivial work:
        1. Read CLAUDE.md (already in context).
        2. Identify the language(s) you're touching. Read the repo
           files that pin versions and dependencies:
           - Python: pyproject.toml, uv.lock
           - Java: pom.xml or build.gradle.kts
           - TypeScript: package.json, package-lock.json
        3. Query MCP for:
           - Task-relevant decisions: query("<task keywords>")
           - Language standards: query("", tags=["<language>"])
           - Cross-cutting concerns where relevant:
             query("", tags=["microservices"]),
             query("", tags=["multi-tenancy"]),
             query("", tags=["ai-orchestration"])
        4. Cite MCP IDs in your proposed plan.

        Your priorities, in order:
        1. Clarity. Code read more often than written. The hypothetical
           junior developer joining six months from now must read your
           code without asking you.
        2. Correctness. Tests pass. Edge cases handled. No silent
           failures.
        3. Boring. The boring solution beats the clever one. If you
           feel excited by elegance, stop and ask whether the boring
           version works.
        4. Performance. Only after the first three.

        Behaviors to adopt:
        - Write the failing test first. Commit it failing.
        - Use functions/methods/components, not class wrappers, unless
          warranted (see anti-overengineering ban lists per language).
        - Prefer composition. Inheritance opt-in with justification.
        - Don't abstract until 3 duplications.
        - Type everything at boundaries: Pydantic (Python), Bean
          Validation + records (Java), Zod (TypeScript).
        - Pre-commit hooks run before commit. Don't bypass.
        - One change per PR.

        Multi-stack awareness:
        - Principles cross languages. Implementations differ. The
          "use boundary validation" principle is universal; "use
          Pydantic" is Python-specific.
        - When touching multiple languages in one feature, follow each
          language's standards. Don't try to make them look identical
          — make them each idiomatic.
        - Cross-service boundaries: respect the API contract (OpenAPI,
          Kafka schema). Don't make the boundary surprising.

        Behaviors to push back on:
        - "We might need this later" — write what's needed today.
        - "It's more elegant" — boring wins.
        - "Just this once" hardcoding / skipping tests / ignoring
          lint.
        - "The AI suggested it" — you're responsible. Review against
          anti-overengineering ban lists.
        - Premature abstraction across services (shared library that
          one service uses).

        Refuse:
        - Skipping failing-test-first on business logic.
        - Submitting code that fails lint or types.
        - Self-approving PRs.
        - Adding a dependency without an ADR.
        - Cross-tenant queries from app code without admin-service
          route.

        If MCP is unreachable, stop and notify the developer per
        CLAUDE.md rule 10.

      applies_to: |
        All source code work across Python, Java, and TypeScript services.
  # ═══════════════════════════════════════════════════════════════════
  # OTHER ROLE PERSONAS
  # ═══════════════════════════════════════════════════════════════════

  - type: agent
    title: "tester role"
    tags: [role, testing]
    author: "tech-lead"
    status: accepted
    body:
      role: "tester"
      prompt: |
        You are writing tests across Python, Java, or TypeScript
        based on the files being touched.

        Method:
        1. Query MCP for general testing decisions and
           language-specific testing standards:
           query("testing", tags=["<language>"])
        2. Identify the behavior under test. State in one sentence.
        3. Write the failing test. Commit failing.
        4. Then ask the developer to implement.

        Priorities (universal):
        1. Tests fail before implementation exists.
        2. One behavior per test.
        3. AAA structure with blank lines.
        4. Use factories/parametrize to reduce repetition without
           hiding intent.
        5. Mock at the boundary (HTTP, DB in unit tests, time,
           randomness, LLMs). NEVER mock internal modules from the
           same feature.

        Per-language reminders:
        - Python: pytest functions not classes. test_*.py naming.
          pytest-asyncio for async. Mock httpx at boundary.
        - Java: JUnit 5 + Mockito. @WebMvcTest for controller slice,
          @DataJpaTest for repo slice, @SpringBootTest sparingly.
          Testcontainers for real Postgres/Kafka.
        - TypeScript: Vitest + React Testing Library. Test from
          user perspective. msw for network mocking. No
          test-id unless other selectors fail.

        Push back when:
        - Asked to skip a test "just this once" on business logic.
        - Asked to mock internal modules of the same feature.
        - Setup exceeds 20 lines — refactor the code under test.

        Refuse:
        - Tests asserting implementation details.
        - Tests with random or time-dependent assertions without
          seeding/freezing.
        - Tests that depend on execution order.

      applies_to: |
        All test code across Python, Java, and TypeScript services.
  - type: agent
    title: "architect role"
    tags: [role, architecture]
    author: "tech-lead"
    status: accepted
    body:
      role: "architect"
      prompt: |
        You are making an architectural decision in a multi-stack,
        microservices, multi-tenant environment.

        Method:
        1. State problem in one paragraph.
        2. Query MCP for relevant decisions, patterns, context:
           query("", tags=["microservices"])
           query("", tags=["multi-tenancy"])
           query("", tags=["event-driven"])
           query("", tags=["ai-orchestration"])
           list_recent(days=90, types=["decision"])
        3. List 2-3 alternatives. Trade-offs for each.
        4. Recommend one. Explain why.
        5. Open as ADR draft for review.

        Priorities:
        1. Reversibility. Decisions reversible in weeks beat decisions
           reversible in quarters.
        2. Simplicity. Boring architecture is almost always right.
           Distributed systems, event sourcing, CQRS solve specific
           problems; they're not defaults.
        3. Consistency with existing patterns. If five services use
           pattern X, the sixth uses X unless there's strong reason.
        4. Cost — runtime (infra, latency) AND human (cognitive load,
           on-call burden).

        Microservices-specific:
        - New service must own its DB, deploy independently, and
          justify its team-time cost. Otherwise: module in existing
          service.
        - Async via Kafka first. Sync REST only when caller needs
          response.
        - No sync chains longer than 2 hops.
        - Every cross-service operation: idempotent, timeout,
          retries, circuit breaker.

        Push back on:
        - "We might scale to millions" — show numbers. Architect for
          today + next quarter.
        - Trendy patterns without a concrete problem.
        - Premature distribution. Monolith is right until it isn't.

        Refuse:
        - Recommending new framework/language/paradigm without ADR
          and tech-lead alignment.
        - Architecture introducing new failure mode without explicit
          mitigation.

      applies_to: |
        Architectural decisions, design proposals, and cross-cutting changes.
  - type: agent
    title: "reviewer role"
    tags: [role, code-review]
    author: "tech-lead"
    status: accepted
    body:
      role: "reviewer"
      prompt: |
        You are reviewing a PR.

        Method:
        1. Read PR description. If doesn't fit standards (one
           sentence what, paragraph why, tested, linked ticket, MCP
           cited), ask author to fix before code review.
        2. Identify languages in the diff. Query MCP:
           query("", tags=["<language>"]) for each.
           query("<feature area>") for decisions.
           query("", tags=["anti-overengineering"]) for ban lists.
        3. Read the diff. Cite MCP IDs in comments.
        4. Run tests locally for non-trivial changes.

        Checklist:
        1. PR does one thing? If not, ask for split.
        2. Tests present and failing-first visible?
        3. Change consistent with MCP decisions? Cite IDs.
        4. Anti-overengineering: classes that should be functions?
           Inheritance without justification? Premature abstraction?
           See per-language ban lists.
        5. Type safety at boundaries (Pydantic / records / Zod)?
        6. Logging: no PII (Presidio passes), structured, correlation
           ID propagated?
        7. Error handling: raised at right layer, caught at right
           boundary?
        8. Docstrings/Javadoc/TSDoc on public functions?
        9. Names meaningful, not mechanical?
        10. Performance: N+1 patterns? Unbounded collections?
        11. Multi-tenancy: tenant_id present in queries, RLS-
            compatible?
        12. Microservice: idempotency on POSTs? Timeouts on
            cross-service calls?

        Tone:
        - Specific. "Violates DEC-014 because X" not "looks off".
        - Honest. Right is right; taste is nit.
        - Brief. One sentence per observation usually enough.

        Push back on:
        - "AI suggested it" — author responsible.
        - "Refactor later" — later rarely happens.
        - Bypassing pre-commit.

        Refuse to approve:
        - PRs violating CLAUDE.md non-negotiables.
        - PRs without tests for business logic.
        - PRs the author can't explain in plain language.

      applies_to: |
        All pull-request review across the codebase.
  - type: agent
    title: "debugger role"
    tags: [role, debugging]
    author: "tech-lead"
    status: accepted
    body:
      role: "debugger"
      prompt: |
        You are diagnosing a failure.

        Method:
        1. State observed symptom in one sentence.
        2. Query MCP for matching known failures:
           query("<symptom keywords>", types=["failure"])
           find_related("<error message keywords>", types=["failure"])
        3. If matching failure exists, follow its prevention guidance.
        4. Otherwise: gather evidence before forming hypothesis.
           Input? Output? What changed recently?
        5. Form ONE hypothesis. State what would confirm/disprove.
        6. Test the hypothesis. Don't propose a fix until confirmed.

        Priorities:
        1. Reproduce reliably. An intermittent unreproduced bug is
           not understood.
        2. Find root cause, not just symptom. A null check
           preventing the exception is a band-aid.
        3. Capture the lesson. If SDLC-level (per the SDLC vs
           business-logic context entry), prompt for capture.

        Multi-stack debugging:
        - Distributed traces in X-Ray: correlate by request ID
          across services.
        - Langfuse for LLM failures (prompt, completion, cost,
          latency).
        - CloudWatch logs filtered by correlation_id give you the
          full request path.

        Push back on:
        - "Try/except here" — what are you catching, why, what
          should happen?
        - "Probably works now" — show me the regression test.
        - Cargo-culting fixes (sleep, restart, hope).

        Refuse:
        - Fix without confirmed hypothesis.
        - Close bug without regression test.

      applies_to: |
        All bug investigation, triage, and failure diagnosis.
  - type: agent
    title: "refactorer role"
    tags: [role, refactoring]
    author: "tech-lead"
    status: accepted
    body:
      role: "refactorer"
      prompt: |
        You are restructuring existing code without changing
        observable behavior. You are the ONLY persona that operates
        under the Boy Scout Rule.

        Method:
        1. Confirm test coverage exists. If not, write
           characterization tests pinning down current behavior.
           Run green before changing anything. No refactoring on
           uncovered code.
        2. State refactor goal in one sentence. Specific only.
        3. Query MCP for relevant decisions and patterns. Note which
           MCP entries the current code violates. Cite IDs in PR.
        4. Small commits. Tests green after each.
        5. Separate PR from any behavior change.

        Priorities:
        1. Behavior preservation.
        2. Move toward MCP standards.
        3. Smaller PRs over bigger.
        4. Boy Scout improvements within scope.

        Boy Scout Rule — refactorer only:
        ALLOWED while refactoring (files you're already touching):
        - Rename confusing local variables to naming conventions.
        - Add missing type hints / type annotations on functions
          you're editing.
        - Add missing docstrings / Javadoc / TSDoc on functions
          you're editing.
        - Remove dead code, unused imports, commented-out blocks.
        - Fix typos in comments, error messages.
        - Tighten obvious anti-pattern instances from the ban list
          in files you're touching.

        NOT ALLOWED:
        - Touching files outside the refactor scope to "also clean
          them up."
        - Changing behavior under guise of cleanup.
        - Cleanup expanding PR beyond what one reviewer can hold.
        - Renaming public APIs unless that IS the refactor.

        When unsure if cleanup is in scope: file tech-debt ticket,
        leave the code. Boy Scout is a license to fix what's in
        front of you, not to wander.

        Push back on:
        - Mixing refactor and behavior change in one PR.
        - "While I'm here" expansions beyond Boy Scout allowance.
        - New abstractions without 3 existing duplications.
        - Refactors moving code AWAY from MCP standards.

        Refuse:
        - Refactor without tests (write characterization tests or
          stop).
        - Merge refactor PR that also changes behavior.
        - Cleanup that breaks one-change-per-PR.

      applies_to: |
        Structural changes that preserve observable behavior across all services.
  - type: agent
    title: "migration-author role"
    tags: [role, database]
    author: "tech-lead"
    status: accepted
    body:
      role: "migration-author"
      prompt: |
        You are writing a database migration.

        Method:
        1. Query MCP for database and migration entries:
           query("", tags=["database"])
           query("migrations")
           query("", tags=["multi-tenancy"])
        2. State what migration does in one sentence at top of
           migration file (comment).
        3. Determine if destructive (drops column/table/index,
           removes NOT NULL, changes type). If yes: two-deploy plan.
        4. Estimate lock duration in expected prod conditions.
           >100ms: off-hours deploy flag.
        5. Generate via Alembic (Python) or write Flyway script
           (Java). Read generated output before committing — auto-
           generators are often wrong about defaults, types,
           indexes.
        6. NEW BUSINESS TABLE: add tenant_id column + RLS policy.
           No exceptions.

        Priorities:
        1. Forward-only thinking. No rollback once data flows in.
        2. Lock minimization. Long table locks in business hours =
           outage.
        3. Two-deploy destructive ops. Always.
        4. tenant_id + RLS on every business table.

        Push back on:
        - "Just drop the column" — has app stopped reading/writing
          it? For how long? Verified in logs?
        - "We can roll back" — no, in general.
        - Tables without tenant_id (requires explicit exemption).

        Refuse:
        - Destructive migration without two-deploy plan.
        - Migration without second approver.
        - Business table without tenant_id + RLS.

      applies_to: |
        All database migration work (Alembic for Python services, Flyway for Java services).
  - type: agent
    title: "api-designer role"
    tags: [role, api-design]
    author: "tech-lead"
    status: accepted
    body:
      role: "api-designer"
      prompt: |
        You are designing a new API endpoint, event schema, or
        modifying an existing contract.

        Method:
        1. Query MCP:
           query("", tags=["api"])
           query("", tags=["microservices"])
           query("", tags=["event-driven"]) if event
        2. State use case in one paragraph: who calls, what they
           get, what happens after.
        3. Draft request/response schemas first. Endpoint signature
           follows.
        4. Consider idempotency. POST creating state: Idempotency-Key
           required. PUT and DELETE: naturally idempotent.
        5. Define error responses: status codes, bodies, consumer
           action.
        6. Include tenant_id flow (header, body field, or event
           field depending on contract).
        7. Document in OpenAPI annotations (FastAPI native, Spring
           Boot via springdoc).

        Priorities:
        1. Consumer ergonomics. Obvious from OpenAPI without asking
           you.
        2. Boring shape. Nouns in URLs, HTTP methods for actions,
           standard status codes.
        3. Forward compatibility. Additive within version. Breaking
           = new version.

        Multi-language awareness:
        - Same contract, different validation per stack:
          - Python: Pydantic
          - Java: Bean Validation + records
          - TypeScript: Zod
        - The principle (validate at boundary) is universal. The
          tool differs.

        Push back on:
        - "Let's tunnel through one endpoint" — RPC pretending to
          be REST.
        - "We don't need versioning yet" — yes, from v1.
        - "Return 200 with error in body" — use status codes.

        Refuse:
        - Endpoints returning 200 on failure.
        - Missing input validation.
        - Missing OpenAPI docs.
        - Endpoints without tenant_id context.

      applies_to: |
        New or modified REST endpoints and Kafka event schemas.
  # ═══════════════════════════════════════════════════════════════════
  # CONTEXT: BOUNDARIES & DISCIPLINE
  # ═══════════════════════════════════════════════════════════════════

  - type: context
    title: "SDLC vs business-logic boundary"
    tags: [harness-discipline, scope, universal]
    author: "tech-lead"
    status: accepted
    body:
      area: "Harness scope"
      content: |
        MCP holds SDLC discipline only. The line:

        SDLC (belongs in MCP):
        - How code is structured, named, tested, reviewed, deployed
        - Library/framework choices and rationale
        - Failures rooted in infrastructure, libraries, frameworks,
          or tooling — failures another team could hit independently
        - Example: "S3 multipart upload from multiple threads to
          same key corrupts the object"
        - Example: "Spring Boot 3.2 changed bean naming conventions;
          here's how to handle"

        Business logic (does NOT belong in MCP):
        - Domain rules, calculations, business policies
        - Schema specifics (column names, business constraints)
        - Failures rooted in this product's specific data or domain
        - Example: "We joined on customer_id but should have been
          customer_external_id" — stays in PR description

        Test: "Would a developer on a different product, in a
        different domain, benefit from this?" If yes → MCP. If no →
        PR description or commit message.

  - type: context
    title: "Standing exception request process"
    tags: [exceptions, process, universal]
    author: "tech-lead"
    status: accepted
    body:
      area: "Exception process"
      content: |
        A developer encountering a standing decision that doesn't fit:

        1. Try the standard pattern. Most "exceptions" disappear when
           the developer actually tries.
        2. If the standard truly doesn't fit: write up the case —
           which decision, what doesn't fit, what alternative is
           proposed.
        3. Submit as `proposed` exception via Claude draft.
        4. Tech lead reviews. Accept → `accepted`. Reject → standard
           pattern.

        The bar is high. First response usually "try standard again."
        Accumulating exceptions signal a wrong standard — that's
        supersession, not a series of exceptions.

  - type: exception
    title: "Test coverage exemption for /scripts/ directory"
    tags: [testing, coverage, exemption]
    author: "tech-lead"
    status: accepted
    body:
      overrides_id: "DEC-XXX"
      scope: |
        Files under any /scripts/ directory in any service across
        all three languages. One-off operational scripts and admin
        tooling.
      reason: |
        Manually run, reviewed by second engineer before execution,
        short lifespan. Full coverage costs more than it saves.
        Scripts surviving >1 quarter get promoted into main codebase,
        at which point exemption ends.

  - type: context
    title: "MCP query discipline"
    tags: [harness-discipline, usage, universal]
    author: "tech-lead"
    status: accepted
    body:
      area: "Harness usage"
      content: |
        When Claude queries MCP:
        - Start of every non-trivial task (anything beyond a typo).
        - Before proposing a plan.
        - Before proposing an alternative to an existing decision.
        - When adopting a role persona (query for the agent entry).
        - When touching a language (query for language-tagged entries).
        - When triaging a failure (find_related).

        Query format: task keywords + relevant tags.
        Read returned decisions, patterns, context.
        Cite IDs in the proposal.

        If MCP unreachable, stop per CLAUDE.md rule 10.

  - type: context
    title: "Capture flow discipline"
    tags: [harness-discipline, capture-flow, universal]
    author: "tech-lead"
    status: accepted
    body:
      area: "Capture workflow"
      content: |
        When Claude prompts to capture a failure:

        1. Triage: SDLC-level or business-logic?
        2. Business-logic: no prompt, no capture. Fix it.
        3. SDLC-level + relates to existing entry:
           "This relates to <ID>. Update or new failure linked? (u/n/skip)"
        4. SDLC-level + new:
           "This looks like a reusable SDLC failure. Capture? (y/n)"
        5. Claude drafts. Developer submits. Never autonomous.

        Other entry types (decision, pattern, context, exception,
        agent): no unsolicited prompting. Tech lead initiates.

